<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Course Product Card</title>
  </head>
  <body class="bg-[#121212] font-sans antialiased text-white py-6">
    <div
      id="popup"
      class="fixed top-10 left-1/2 -translate-x-1/2 bg-emerald-500 text-white px-6 py-3 rounded-full shadow-2xl font-bold opacity-0 transition-opacity duration-300 pointer-events-none z-50"
    >
      Cart Added Successfully
    </div>
    <div class="h-full w-full flex justify-center items-center p-4">
      <div
        class="w-full max-w-sm rounded-3xl overflow-hidden bg-[#1e293b] border border-[#334155] shadow-2xl"
      >
        <div
          class="bg-gradient-to-r from-teal-600 to-teal-500 p-6 flex flex-col items-center justify-center relative min-h-[160px]"
        >
          <div
            id="unit_price"
            class="unit_price absolute top-4 right-4 bg-[#121212]/30 px-3 py-1 rounded-full text-xs font-mono text-white"
          ></div>
          <div
            id="love_button"
            class="absolute top-4 left-4 bg-[#121212]/30 px-3 py-1 rounded-full text-lg font-mono text-white"
          ></div>
          <h1 class="text-6xl font-light tracking-tight text-white/90">
            Product
          </h1>
        </div>
        <div class="p-6">
          <h2 class="text-xl font-bold text-white mb-6">
            Reactive Accelerator Course
          </h2>
          <div
            class="bg-[#111827]/60 rounded-xl p-5 mb-6 space-y-4 border border-[#334155]/50"
          >
            <div class="flex justify-between items-center text-sm">
              <span class="text-slate-400">Unit Price</span>
              <span class="unit_price text-xl font-mono text-teal-400"></span>
            </div>
            <div
              class="flex justify-between items-center text-sm border-t border-[#334155]/50 pt-4"
            >
              <span class="text-slate-400">Total Amount</span>
              <span id="total-amount" class="text-xl font-mono text-teal-400"
                >৳ 0</span
              >
            </div>
            <div
              class="flex justify-between items-center text-sm border-t border-[#334155]/50 pt-4"
            >
              <span class="text-slate-400">Total Stock</span>
              <span
                id="total-stock"
                class="text-xl font-mono text-teal-400"
              ></span>
            </div>
            <div
              class="flex justify-between items-center text-sm border-t border-[#334155]/50 pt-4"
            >
              <span class="text-slate-400">Remaining stock</span>
              <span
                id="remaining-stock"
                class="text-xl font-mono text-teal-400"
              ></span>
            </div>
          </div>
          <div class="space-y-6">
            <div class="flex flex-col gap-2">
              <label class="text-xs text-slate-400">Quantity</label>
              <div
                class="flex items-center justify-between gap-4 bg-[#111827]/60 rounded-xl p-2 border border-[#334155]/50"
              >
                <button
                  id="decrement-button"
                  class="bg-[#334155] w-10 h-10 rounded-lg flex justify-center items-center text-slate-300 hover:bg-[#475569] active:scale-95 transition-all"
                >
                  <svg
                    class="w-5 h-5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M20 12H4"
                    ></path>
                  </svg>
                </button>
                <span id="quantity" class="text-2xl font-semibold text-white">
                  0
                </span>
                <button
                  id="increment-button"
                  class="bg-[#334155] w-10 h-10 rounded-lg flex justify-center items-center text-slate-300 hover:bg-[#475569] active:scale-95 transition-all"
                >
                  <svg
                    class="w-5 h-5"
                    fill="none"
                    stroke="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M12 4v16m8-8H4"
                    ></path>
                  </svg>
                </button>
              </div>
            </div>
            <button
              id="add-to-cart-button"
              class="w-full bg-gradient-to-r from-teal-500 to-cyan-500 py-3 rounded-xl font-semibold text-white hover:from-teal-600 hover:to-cyan-600 active:scale-98 transition-all shadow-lg shadow-teal-500/20"
            >
              Add to Cart
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
